name: Benchmarks

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run latency benchmark
        run: npx tsx benchmarks/latency.bench.ts

      - name: Run aggregation benchmark
        run: npx tsx benchmarks/aggregation.bench.ts
